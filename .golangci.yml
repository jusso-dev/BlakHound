run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - gosec
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/jusso-dev/BlakHound
  gosec:
    excludes:
      - G104 # handled explicitly where errors are intentionally ignored

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
